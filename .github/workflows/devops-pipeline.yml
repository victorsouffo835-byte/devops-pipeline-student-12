name: Full DevOps Pipeline - Student 12

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '2'

      - name: Install Dependencies
        run: npm install

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Run Tests
        run: npm test

  security_scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

  docker_build:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t my-app-12 .

      - name: Tag Docker Image
        run: docker tag my-app-12:latest ${{ secrets.DOCKER_USERNAME }}/my-app-12:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-app-12:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker_build
    steps:
      - name: Deploy to AWS EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_PUBLIC_IP }}
          USER: ubuntu
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -o StrictHostKeyChecking=no -i private_key.pem $USER@$HOST << EOF
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-app-12:latest
            docker stop my-app-12 || true
            docker rm my-app-12 || true
            docker run -d -p 5000:5000 --name my-app-12 ${{ secrets.DOCKER_USERNAME }}/my-app-12:latest
          EOF
